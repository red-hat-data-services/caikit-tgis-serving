name: "Build and Test"

on:
  schedule:
    - cron: "20 4 * * 1" # once a week
  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - "!docs"
      - "!demo"

  pull_request:

env:
  KIND_CLUSTER_NAME: "kserve-testing"
  ISVC_NAME: "caikit-tgis-isvc"
  TEST_NS: "kserve-demo"
  ODH_KSERVE_REF: "master"
  # note: knative serving will try to resolve the image tag unless the registry is kind.local
  # See the deployment configmap:
  #   registries-skipping-tag-resolving: "kind.local,ko.local,dev.local"
  DEV_IMAGE: "kind.local/caikit-tgis-serving:dev"

jobs:
  build-image:
    name: "Build image"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ env.DEV_IMAGE }}
          # outputs: type=oci,dest=/tmp/image.tar
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: caikit-tgis-serving
          path: /tmp/image.tar

  compose-smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest

    needs: build-image

    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: caikit-tgis-serving
          path: /tmp

      - name: Load Docker image
        run: |
          docker load --input /tmp/image.tar

      - name: Pull tgis image
        run: |
          docker pull quay.io/opendatahub/text-generation-inference:stable

      - name: Test image
        run: |
          cd test/compose
          bash -x smoke-test.sh
        env:
          CI: true

  kserve-smoke-test:
    needs: build-image

    name: Kserve Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      WAIT_RETRIES: 20
      WAIT_INTERVAL: 180s
    steps:
      - uses: actions/checkout@v4

      - name: Setup kind
        uses: helm/kind-action@v1.14.0
        with:
          version: v0.31.0
          node_image: kindest/node:v1.35.0
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          config: test/kserve/kind_config.yaml

      - name: Setup kserve from ODH repo
        run: |
          set -Eeuo pipefail

          max_attempts=3
          sleep_seconds=60
          attempt=1
          while [[ ${attempt} -le ${max_attempts} ]]; do
            echo "Installing KServe (attempt ${attempt}/${max_attempts})"
            rm -rf /tmp/odh-kserve
            git clone --depth 1 --branch "${ODH_KSERVE_REF}" https://github.com/opendatahub-io/kserve.git /tmp/odh-kserve
            if (cd /tmp/odh-kserve && bash hack/kserve-install.sh); then
              if kubectl wait -n knative-serving --for=condition=Available deploy/webhook --timeout=20m && \
                 kubectl wait -n knative-serving --for=condition=Available deploy/controller --timeout=20m && \
                 kubectl wait -n knative-serving --for=condition=Available deploy/activator --timeout=20m && \
                 kubectl wait -n knative-serving --for=condition=Available deploy/autoscaler --timeout=20m; then
                break
              fi
            fi
            if [[ ${attempt} -eq ${max_attempts} ]]; then
              echo "KServe installation failed after ${max_attempts} attempts"
              exit 1
            fi
            attempt=$((attempt + 1))
            sleep "${sleep_seconds}"
          done

      - name: Configure namespace
        run: |
          kubectl create namespace "${TEST_NS}" || true
          kubectl config set-context "kind-${KIND_CLUSTER_NAME}" --namespace "${TEST_NS}"

      - name: Ensure Knative skip-registry includes kind.local
        run: |
          CURRENT="$(kubectl get knativeserving -n knative-serving knative-serving -o jsonpath='{.spec.config.deployment.registries-skipping-tag-resolving}')"
          if [[ -z "${CURRENT}" ]]; then
            CURRENT="$(kubectl get configmap -n knative-serving config-deployment -o jsonpath='{.data.registries-skipping-tag-resolving}')"
          fi
          case ",${CURRENT}," in
            *,kind.local,*) echo "kind.local already configured: ${CURRENT}" ;;
            *)
              NEW="${CURRENT:+${CURRENT},}kind.local,ko.local,dev.local"
              kubectl patch knativeserving -n knative-serving knative-serving --type merge -p "{\"spec\":{\"config\":{\"deployment\":{\"registries-skipping-tag-resolving\":\"${NEW}\"}}}}"
              ;;
          esac

          kubectl wait -n knative-serving --for=condition=Ready knativeserving/knative-serving --timeout=10m
          FINAL="$(kubectl get configmap -n knative-serving config-deployment -o jsonpath='{.data.registries-skipping-tag-resolving}')"
          echo "Final skip list: ${FINAL}"
          case ",${FINAL}," in
            *,kind.local,*) ;;
            *) echo "kind.local missing from registries-skipping-tag-resolving"; exit 1 ;;
          esac

      - name: Download built image
        uses: actions/download-artifact@v4
        with:
          name: caikit-tgis-serving
          path: /tmp

      - name: Load built image into kind
        run: |
          kind load image-archive --name ${{ env.KIND_CLUSTER_NAME }} /tmp/image.tar

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false

      - name: Setup flan-t5-small model volume
        run: |
          sed 's|quay.io/opendatahub/caikit-tgis-serving:fast|${{ env.DEV_IMAGE }}|g' test/kserve/setup.yaml | \
            kubectl apply -f -

          max_retries=${WAIT_RETRIES}
          wait_time=${WAIT_INTERVAL}
          until kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/setup-flan-t5-small --timeout ${wait_time}; do
            echo "Current status:"
            kubectl describe pod,pv,pvc
            max_retries=$((max_retries-1))
            if [[ $max_retries -le 0 ]]; then
              echo "Failed to setup model"
              kubectl logs pod/setup-flan-t5-small --all-containers
              exit 1
            fi
            echo "-------------------"
          done

      - name: Deploy ServingRuntime/InferenceService
        run: |
          sed 's|quay.io/opendatahub/caikit-tgis-serving:fast|${{ env.DEV_IMAGE }}|g' test/kserve/caikit-tgis-serving.yaml | \
            kubectl apply -f -

          max_retries=${WAIT_RETRIES}
          wait_time=${WAIT_INTERVAL}
          until kubectl wait isvc/${ISVC_NAME} --for=condition=Ready --timeout=${wait_time}; do
            echo "Current status:"
            kubectl describe isvc,servingruntime,pod
            max_retries=$((max_retries-1))
            if [[ $max_retries -le 0 ]]; then
              exit 1
            fi
            echo "-------------------"
          done

      - name: Install caikit-nlp-client
        run: |
          python -m venv .venv
          source .venv/bin/activate

          pip install caikit-nlp-client

      - name: Perform test inference (http)
        run: |
          set -Eeuo pipefail
          source .venv/bin/activate

          export ISVC_URL="$(kubectl get isvc ${ISVC_NAME} -o jsonpath='{.status.components.predictor.url}')"
          LATEST_READY_REVISION="$(kubectl get isvc ${ISVC_NAME} -o jsonpath='{.status.components.predictor.latestReadyRevision}')"
          PRIVATE_REVISION_SERVICE="${LATEST_READY_REVISION}-private"
          PORT_FORWARD_PORT="${PF_PORT:-18080}"
          PRIVATE_ENDPOINT_IP=""

          # Wait until the private revision service has at least one backend endpoint.
          for i in {1..30}; do
            PRIVATE_ENDPOINT_IP="$(kubectl get endpointslice -n ${TEST_NS} -l "kubernetes.io/service-name=${LATEST_READY_REVISION}-private" -o jsonpath='{.items[0].endpoints[0].addresses[0]}' 2>/dev/null || true)"
            if [[ -n "${PRIVATE_ENDPOINT_IP}" ]]; then
              echo "Private endpoint ready at: ${PRIVATE_ENDPOINT_IP}"
              break
            fi
            sleep 2
          done
          if [[ -z "${PRIVATE_ENDPOINT_IP}" ]]; then
            echo "Timed out waiting for endpoint on service ${PRIVATE_REVISION_SERVICE}"
            exit 1
          fi

          kubectl -n ${TEST_NS} port-forward "service/${PRIVATE_REVISION_SERVICE}" "${PORT_FORWARD_PORT}:80" >/tmp/kserve-pf.log 2>&1 &
          PF_PID=$!
          cleanup_pf() {
            kill "${PF_PID}" >/dev/null 2>&1 || true
            wait "${PF_PID}" 2>/dev/null || true
          }
          trap cleanup_pf EXIT
          sleep 3

          ISVC_URL="http://127.0.0.1:${PORT_FORWARD_PORT}" python test/smoke-test.py
